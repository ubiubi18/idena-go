name: Release Idena

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true

      - name: Validate tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Unsupported release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify modules
        run: go mod verify

      - name: Format
        run: test -z "$(git ls-files -z '*.go' | xargs -0 gofmt -l)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Vulnerability scan
        run: ./scripts/govulncheck-filter.sh

      - name: Memory IPFS contract build
        run: ./scripts/check-memory-ipfs-build.sh

  build:
    name: ${{ matrix.build }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x64
            os: ubuntu-24.04
            asset_prefix: idena-node-linux
            extension: ''
          - build: linux-arm64
            os: ubuntu-24.04-arm
            asset_prefix: idena-node-linux-aarch64
            extension: ''
          - build: windows-x64
            os: windows-2025
            asset_prefix: idena-node-win
            extension: .exe
          - build: macos-x64
            os: macos-15-intel
            asset_prefix: idena-node-mac
            extension: ''
          - build: macos-arm64
            os: macos-15
            asset_prefix: idena-node-mac-arm64
            extension: ''

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true

      - name: Get asset name
        env:
          ASSET_PREFIX: ${{ matrix.asset_prefix }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset_name="${ASSET_PREFIX}-${version}${EXTENSION}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - name: Verify modules
        run: go mod verify

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p builds
          go build -mod=readonly -trimpath -buildvcs=true \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "builds/${ASSET_NAME}" .
          (cd builds && openssl dgst -sha256 -r "${ASSET_NAME}" > "${ASSET_NAME}.sha256")

      - name: Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          files: |
            builds/${{ env.ASSET_NAME }}
            builds/${{ env.ASSET_NAME }}.sha256
