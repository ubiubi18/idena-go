name: Release Idena

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      matrix:
        go-version: [1.26.4]
        os: ["ubuntu-24.04", "windows-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Get Sources
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Get tag
        run: |
          gitTag="${GITHUB_REF#refs/tags/}"
          if [[ ! "${gitTag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Unsupported release tag: ${gitTag}" >&2
            exit 1
          fi
          echo "GIT_TAG=${gitTag#v}" >> "$GITHUB_ENV"

      - name: Get asset name
        id: asset
        run: |
          tag="${GIT_TAG}"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            asset_name="idena-node-linux-${tag}"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            asset_name="idena-node-mac-${tag}"
          else
            asset_name="idena-node-win-${tag}.exe"
          fi
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - name: Test
        run: go test -v ./...

      - name: Vulnerability scan
        if: runner.os == 'Linux'
        run: ./scripts/govulncheck-filter.sh

      - name: Memory IPFS contract build
        if: runner.os == 'Linux'
        run: ./scripts/check-memory-ipfs-build.sh

      - name: Build
        run: |
          mkdir -p builds
          go build -ldflags "-X main.version=${GIT_TAG}" -o="builds/${ASSET_NAME}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          files: builds/${{ env.ASSET_NAME }}

  build-linux-aarch64:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goos: [linux]
        goarch: [arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Get tag
        run: |
          gitTag="${GITHUB_REF#refs/tags/}"
          if [[ ! "${gitTag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Unsupported release tag: ${gitTag}" >&2
            exit 1
          fi
          echo "GIT_TAG=${gitTag#v}" >> "$GITHUB_ENV"

      - name: Get asset name
        id: asset
        run: |
          tag="${GIT_TAG}"
          asset_name="idena-node-linux-aarch64-${tag}"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - uses: wangyoucao577/go-release-action@v1.55
        with:
          pre_command: "apt-get update && apt-get -y install gcc-aarch64-linux-gnu && export CGO_ENABLED=1 && export CC=aarch64-linux-gnu-gcc && CC_FOR_TARGET=aarch64-unknown-linux-gnu"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goversion: 1.26.4
          ldflags: "-X main.version=${{ env.GIT_TAG }}"
          binary_name: "idena-node"
          asset_name: ${{ env.ASSET_NAME }}
