name: Release Idena

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      matrix:
        include:
          - go-version: 1.17.x
            os: ubuntu-24.04
          - go-version: 1.17.x
            os: windows-2022
          - go-version: 1.19.x
            os: macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Get Sources
        uses: actions/checkout@v5

      - name: Get asset name
        id: asset
        run: |
          tag=${GITHUB_REF_NAME#v}
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            asset_name="idena-node-linux-${tag}"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            asset_name="idena-node-mac-${tag}"
          else
            asset_name="idena-node-win-${tag}.exe"
          fi
          echo "GIT_TAG=${tag}" >> $GITHUB_ENV
          echo "ASSET_NAME=${asset_name}" >> $GITHUB_ENV

      - name: Test
        run: go test -v ./...

      - name: Build
        run: go build -ldflags "-X main.version=${{ env.GIT_TAG }}" -o=builds/${{ env.ASSET_NAME }}

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          files: builds/${{ env.ASSET_NAME }}

  build-linux-aarch64:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goos: [linux]
        goarch: [arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Get asset name
        id: asset
        run: |
          tag=${GITHUB_REF_NAME#v}
          asset_name="idena-node-linux-aarch64-${tag}"
          echo "GIT_TAG=${tag}" >> $GITHUB_ENV
          echo "ASSET_NAME=${asset_name}" >> $GITHUB_ENV

      - uses: wangyoucao577/go-release-action@v1.55
        with:
          pre_command: "apt-get update && apt-get -y install gcc-aarch64-linux-gnu && export CGO_ENABLED=1 && export CC=aarch64-linux-gnu-gcc && CC_FOR_TARGET=aarch64-unknown-linux-gnu"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goversion: 1.19
          ldflags: "-X main.version=${{ env.GIT_TAG }}"
          binary_name: "idena-node"
          asset_name: ${{ env.ASSET_NAME }}
