name: Release Idena

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true

      - name: Validate tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Unsupported release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Require tag on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "refs/remotes/origin/${DEFAULT_BRANCH}"; then
            echo "Release tag must point to a commit on ${DEFAULT_BRANCH}" >&2
            exit 1
          fi

      - name: Require approved compatibility evidence
        run: bash scripts/check-release-compatibility.sh

      - name: Verify modules
        run: go mod verify

      - name: Format
        run: test -z "$(git ls-files -z '*.go' | xargs -0 gofmt -l)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Vulnerability scan
        run: ./scripts/govulncheck-filter.sh

      - name: Memory IPFS contract build
        run: ./scripts/check-memory-ipfs-build.sh

  build:
    name: ${{ matrix.build }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x64
            os: ubuntu-24.04
            asset_prefix: idena-node-linux
            extension: ''
          - build: linux-arm64
            os: ubuntu-24.04-arm
            asset_prefix: idena-node-linux-aarch64
            extension: ''
          - build: windows-x64
            os: windows-2025
            asset_prefix: idena-node-win
            extension: .exe
          - build: macos-x64
            os: macos-15-intel
            asset_prefix: idena-node-mac
            extension: ''
          - build: macos-arm64
            os: macos-15
            asset_prefix: idena-node-mac-arm64
            extension: ''

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true

      - name: Get asset name
        env:
          ASSET_PREFIX: ${{ matrix.asset_prefix }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset_name="${ASSET_PREFIX}-${version}${EXTENSION}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - name: Verify modules
        run: go mod verify

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p builds
          go build -mod=readonly -trimpath -buildvcs=false \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "builds/${ASSET_NAME}" .
          (cd builds && openssl dgst -sha256 -r "${ASSET_NAME}" > "${ASSET_NAME}.sha256")

      - name: Upload build output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.build }}
          path: |
            builds/${{ env.ASSET_NAME }}
            builds/${{ env.ASSET_NAME }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create draft release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download build outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: builds
          merge-multiple: true

      - name: Verify release assets
        run: >-
          python3 scripts/verify_release_artifacts.py
          compatibility/stack-lock.json
          .
          builds
          "${GITHUB_REF_NAME}"

      - name: Create draft release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          files: builds/*
