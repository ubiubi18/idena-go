name: Legacy compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  legacy-compatibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Guard locked runtime boundary
        run: scripts/check-compatibility-runtime.sh
      - name: Verify modules
        run: go mod verify
      - name: Run chain compatibility fixtures
        run: go test ./compatibility ./resources ./common ./crypto ./protocol ./vm/wasm
