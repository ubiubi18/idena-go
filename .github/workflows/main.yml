name: Build Idena

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.4']

    steps:
      - name: Get Sources
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Format
        shell: bash
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Test
        run: go test -v ./...

      - name: Vulnerability scan
        run: ./scripts/govulncheck-filter.sh

      - name: Build
        run: go build ./...
